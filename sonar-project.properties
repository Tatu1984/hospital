# SonarQube scanner config for HospitalPro.
# Run: sonar-scanner -Dsonar.token=$SONAR_TOKEN
# Server: defaults to a local SonarQube CE at http://localhost:9000.
sonar.projectKey=hospitalpro
sonar.projectName=HospitalPro
sonar.projectVersion=1.0
sonar.host.url=http://localhost:9000

# Source roots — exclude generated, vendored, and build artifacts so
# the analysis focuses on the code we actually own.
sonar.sources=backend/src,frontend/src,mobile/doctor/app,mobile/doctor/lib,mobile/patient/app,mobile/patient/lib
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/build/**,**/coverage/**,**/playwright-report/**,**/playwright/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/migrations/**

# Tests
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.testExecutionReportPaths=

# Language
sonar.sourceEncoding=UTF-8

# TypeScript / JavaScript
sonar.typescript.tsconfigPath=frontend/tsconfig.json,backend/tsconfig.json

# Pull-request decoration (when wired into CI later)
# sonar.pullrequest.key=<PR number>
# sonar.pullrequest.branch=<branch name>
# sonar.pullrequest.base=main
