worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;
    client_max_body_size 25M;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstreams resolve via the Docker network DNS to the compose service names.
    upstream backend_upstream {
        server backend:4000;
    }

    upstream frontend_upstream {
        server frontend:80;
    }

    # HTTP -> redirect to HTTPS when SSL is configured. In the bundled profile
    # SSL cert paths default to /etc/nginx/ssl/{cert,key}.pem; if they're absent
    # the server block stays HTTP-only.
    server {
        listen 80 default_server;
        server_name _;

        # API
        location /api/ {
            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Health probe for nginx itself
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Everything else -> SPA
        location / {
            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
