name: DB Restore Drill

# Weekly disaster-recovery rehearsal.
#
# Pulls the most recent successful backup artifact from the DB Backup
# workflow, restores it into a throwaway Postgres container, and runs basic
# sanity SQL. Any failure here means we have a backup that we can't actually
# restore — which is the same as having no backup at all.
#
# Manual trigger via the Actions tab.

on:
  schedule:
    # Every Monday at 03:00 UTC (08:30 IST). Run after Sunday's nightly
    # backup has finished so the artifact is fresh.
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Optional DB Backup run id to restore (defaults to latest successful)'
        required: false
        default: ''

jobs:
  restore-drill:
    name: Restore-from-backup drill
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: drill
          POSTGRES_PASSWORD: drill
          POSTGRES_DB: drill
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install postgresql-client (match prod major)
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-15 jq

      - name: Find the backup artifact to restore
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.run_id }}" ]; then
            RUN_ID="${{ github.event.inputs.run_id }}"
          else
            # Most recent successful run of the "DB Backup" workflow.
            RUN_ID=$(gh api repos/${{ github.repository }}/actions/workflows \
              | jq -r '.workflows[] | select(.name=="DB Backup") | .id' \
              | head -n1 \
              | xargs -I{} gh api "repos/${{ github.repository }}/actions/workflows/{}/runs?status=success&per_page=1" \
              | jq -r '.workflow_runs[0].id')
          fi
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::Could not find a successful DB Backup run to restore from."
            exit 1
          fi
          echo "Selected DB Backup run id: $RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download backup artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p restore
          ART=$(gh api "repos/${{ github.repository }}/actions/runs/${{ steps.find.outputs.run_id }}/artifacts" \
            | jq -r '.artifacts[] | select(.name | startswith("hospital-backup-")) | .id' \
            | head -n1)
          if [ -z "$ART" ]; then
            echo "::error::No hospital-backup-* artifact on run ${{ steps.find.outputs.run_id }}"
            exit 1
          fi
          gh api "repos/${{ github.repository }}/actions/artifacts/${ART}/zip" > restore/backup.zip
          unzip -d restore restore/backup.zip
          ls -lh restore

      - name: Restore into the throwaway Postgres
        env:
          PGPASSWORD: drill
        run: |
          set -euo pipefail
          DUMP=$(ls restore/hospital_*.sql.gz | head -n1)
          echo "Restoring from $DUMP"
          gunzip -c "$DUMP" \
            | psql -h localhost -U drill -d drill --quiet --set ON_ERROR_STOP=on

      - name: Sanity SQL — every core table has rows
        env:
          PGPASSWORD: drill
        run: |
          set -euo pipefail
          # Each table is non-trivial: if any returns 0 rows, we either have a
          # bad backup or the schema drifted in a way that breaks restore.
          # The list intentionally only includes tables that should NEVER be
          # empty in a populated production database.
          for tbl in tenants branches users patients audit_logs; do
            COUNT=$(psql -h localhost -U drill -d drill -tAc "SELECT count(*) FROM \"$tbl\";")
            echo "$tbl: $COUNT rows"
            if [ "$COUNT" = "0" ]; then
              echo "::error::Restored DB has no rows in $tbl — drill FAILED."
              exit 1
            fi
          done

      - name: Run a smoke query against the restored data
        env:
          PGPASSWORD: drill
        run: |
          # Confirm tenant isolation invariants survived the dump/restore.
          # Every patient row must carry a tenantId that exists in tenants.
          psql -h localhost -U drill -d drill --set ON_ERROR_STOP=on <<'SQL'
            SELECT 1 FROM patients p
            LEFT JOIN tenants t ON t.id = p."tenantId"
            WHERE t.id IS NULL
            LIMIT 1;
          SQL
          # The query returns 0 rows on a healthy restore (empty result set).
          # If any orphaned patient exists, ON_ERROR_STOP doesn't fire — we
          # check the count separately:
          ORPHANS=$(psql -h localhost -U drill -d drill -tAc "
            SELECT count(*) FROM patients p
            LEFT JOIN tenants t ON t.id = p.\"tenantId\"
            WHERE t.id IS NULL;
          ")
          echo "Orphan patients: $ORPHANS"
          if [ "$ORPHANS" != "0" ]; then
            echo "::error::Found $ORPHANS patients without a matching tenant — drill FAILED."
            exit 1
          fi

      - name: Drill report
        if: always()
        run: |
          echo "::notice::Restore drill complete for backup run ${{ steps.find.outputs.run_id }}"
